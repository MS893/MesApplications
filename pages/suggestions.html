<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faire une suggestion - Mes Applications</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .form-container {
      max-width: 600px;
      margin: 60px auto;
    }

    .suggestion-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 3rem;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      padding: 12px 20px;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.2);
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: #94a3b8;
    }

    .back-link {
      color: var(--secondary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--light);
    }
  </style>
</head>

<body>
  <div class="bg-decor"></div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../index.html">Mes applications</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="https://ko-fi.com/skydev_13" target="_blank">Donate</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Faire une suggestion</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="form-container">
      <a href="../index.html" class="back-link animate-up">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-2"
          viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
        </svg>
        Retour à l'accueil
      </a>

      <div class="suggestion-card animate-up delay-100">
        <h1 class="mb-2">Une idée ?</h1>
        <p class="text-secondary mb-4">Aidez-moi à améliorer l'écosystème en partageant vos suggestions.</p>

        <form id="suggestionForm">
          <div class="mb-4">
            <label for="title" class="form-label">Titre de la suggestion</label>
            <input type="text" class="form-control" id="title" placeholder="Ex: Ajout d'une fonctionnalité de météo"
              required>
          </div>
          <div class="mb-4">
            <label for="message" class="form-label">Votre message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Décrivez votre idée en quelques lignes..."
              required></textarea>
          </div>
          <button type="submit" class="btn btn-primary-custom btn-pill w-100 py-3">Générer l'e-mail</button>
        </form>

        <script>
          document.getElementById('suggestionForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;
            const email = "xiomfy@gmail.com";

            // Construction du lien mailto avec encodage des caractères spéciaux
            const mailtoUrl = `mailto:${email}?subject=${encodeURIComponent('[Suggestion App] ' + title)}&body=${encodeURIComponent(message)}`;

            // Ouverture de l'application de messagerie par défaut
            window.location.href = mailtoUrl;
          });
        </script>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer container">
    <p class="text-secondary small">&copy; 2026 MesApplications - Écosystème Android pour Pilotes VFR</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
